<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calorie & BMR Tracker</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NL25M2MSZ3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NL25M2MSZ3');
  </script>

  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
    }
    .green {
      background: #22c55e;
    }
  </style>
</head>
<body>

  <h1>Calorie & BMR Tracker</h1>

  <div class="box">
    <h2>Calculate</h2>

    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <input type="number" id="age" placeholder="Age">

    <select id="gender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <select id="activity">
      <option value="1.2">Sedentary</option>
      <option value="1.375">Light</option>
      <option value="1.55">Moderate</option>
      <option value="1.725">Active</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
  </div>

  <div class="box">
    <h2>Food Log</h2>

    <input type="text" id="food" placeholder="Food name">
    <input type="number" id="foodCalories" placeholder="Calories">

    <button class="green" onclick="addFood()">Add Food</button>

    <div id="log"></div>
    <h3 id="total"></h3>
  </div>

<script>
let foodLog = JSON.parse(localStorage.getItem("foodLog")) || [];

function calculate() {
  let weight = document.getElementById("weight").value;
  let height = document.getElementById("height").value;
  let age = document.getElementById("age").value;
  let gender = document.getElementById("gender").value;
  let activity = document.getElementById("activity").value;

  let bmr = gender === "male"
    ? 10 * weight + 6.25 * height - 5 * age + 5
    : 10 * weight + 6.25 * height - 5 * age - 161;

  let calories = bmr * activity;

  let protein = (calories * 0.3) / 4;
  let carbs = (calories * 0.4) / 4;
  let fats = (calories * 0.3) / 9;

  document.getElementById("result").innerHTML = `
    <p>BMR: ${Math.round(bmr)}</p>
    <p>Calories: ${Math.round(calories)}</p>
    <p>Protein: ${Math.round(protein)}g</p>
    <p>Carbs: ${Math.round(carbs)}g</p>
    <p>Fats: ${Math.round(fats)}g</p>
  `;
}

function addFood() {
  let food = document.getElementById("food").value;
  let calories = document.getElementById("foodCalories").value;

  if (!food || !calories) return;

  foodLog.push({ food, calories: Number(calories) });
  localStorage.setItem("foodLog", JSON.stringify(foodLog));

  document.getElementById("food").value = "";
  document.getElementById("foodCalories").value = "";

  renderLog();
}

function renderLog() {
  let logDiv = document.getElementById("log");
  logDiv.innerHTML = "";

  let total = 0;

  foodLog.forEach(item => {
    total += item.calories;
    logDiv.innerHTML += `<p>${item.food} - ${item.calories} kcal</p>`;
  });

  document.getElementById("total").innerText = "Total: " + total + " kcal";
}

renderLog();
</script>

</body>
</html>
